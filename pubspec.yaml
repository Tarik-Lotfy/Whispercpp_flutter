name: whispercpp_flutter
description: On-device, multilingual speech recognition for Flutter powered by Whisper.
version: 0.0.1
repository: https://github.com/Tarik-Lotfy/Whispercpp_flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.whispercpp_flutter
        pluginClass: WhisperPlugin
      ios:
        pluginClass: WhisperPlugin
